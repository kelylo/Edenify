services:
  - type: web
    name: edenify
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY_1
        sync: false
      - key: OPENAI_API_KEY_2
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
  - type: cron
    name: edenify-keepalive
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: npm install
    startCommand: node scripts/keepalive.cjs
    envVars:
      - key: KEEPALIVE_URL
        sync: false
      - key: APP_URL
        sync: false
