name: Render Keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate secret
        run: |
          if [ -z "${{ secrets.KEEPALIVE_URL }}" ]; then
            echo "Missing KEEPALIVE_URL secret in GitHub repository settings."
            exit 1
          fi

      - name: Ping Render health endpoint
        shell: bash
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
        run: |
          set -euo pipefail

          BASE_URL="${KEEPALIVE_URL%/}"
          HEALTH_URL="${BASE_URL}/api/health"

          echo "Pinging ${HEALTH_URL}"

          ATTEMPT=1
          MAX_ATTEMPTS=3
          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            STATUS=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 30 "$HEALTH_URL" || true)

            if [ "$STATUS" = "200" ]; then
              echo "Keepalive success (attempt ${ATTEMPT})."
              head -c 300 /tmp/health.json || true
              echo
              exit 0
            fi

            echo "Attempt ${ATTEMPT} failed with HTTP ${STATUS}."
            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done

          echo "Keepalive failed after ${MAX_ATTEMPTS} attempts."
          exit 1