services:
  - type: web
    name: edenify-telegram-standalone
    runtime: node
    plan: starter
    autoDeploy: true
    rootDir: telegram-standalone
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_TIMEZONE
        value: UTC
