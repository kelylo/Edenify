services:
  - type: web
    name: edenify
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
  - type: cron
    name: edenify-keepalive
    runtime: node
    schedule: "*/10 * * * *"
    buildCommand: npm install
    startCommand: >-
      node -e "const url=(process.env.KEEPALIVE_URL||'').trim(); if(!url){console.log('KEEPALIVE_URL not set, skipping ping.'); process.exit(0);} fetch(url,{method:'GET'}).then(r=>{console.log('keepalive status',r.status); process.exit(r.ok?0:1);}).catch(e=>{console.error('keepalive failed', e?.message||e); process.exit(1);});"
    envVars:
      - key: KEEPALIVE_URL
        sync: false
