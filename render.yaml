services:
  - type: web
    name: edenify
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
  - type: cron
    name: edenify-keepalive
    runtime: node
    schedule: "*/10 * * * *"
    buildCommand: npm install
    startCommand: >-
      node -e "const raw=(process.env.KEEPALIVE_URL||process.env.APP_URL||'').trim(); if(!raw){console.error('Set KEEPALIVE_URL (for example: https://your-app.onrender.com)'); process.exit(1);} const base=raw.replace(/\/+$/,''); const targets=[`${base}/api/health`,`${base}/api/user/reminder-check`]; Promise.all(targets.map(async (url)=>{const res=await fetch(url,{method:'GET'}); console.log('keepalive',url,res.status); if(!res.ok) throw new Error(`${url} -> ${res.status}`);})).then(()=>process.exit(0)).catch((e)=>{console.error('keepalive failed', e?.message||e); process.exit(1);});"
    envVars:
      - key: KEEPALIVE_URL
        sync: false
      - key: APP_URL
        sync: false
