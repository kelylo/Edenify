name: Telegram Standalone Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  bot-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telegram-standalone/package-lock.json

      - name: Install dependencies
        working-directory: telegram-standalone
        run: npm ci

      - name: Run one-shot bot tick
        working-directory: telegram-standalone
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BOT_TIMEZONE: UTC
          BOT_RUN_MODE: once
        run: npm run start
